<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comentários Loofer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="container">

        <div class="titulo">
            <h2>💚 O que nossas clientes estão dizendo</h2>
            <p>Comentários reais publicados no Instagram.</p>
        </div>

        <div class="slider">

            <button class="prev" id="prev" aria-label="Anterior">
                &#10094;
            </button>

            <div class="viewport">

                <div class="track">

                    <img src="prints/comentario1.png" alt="Comentário 1">
                    <img src="prints/comentario2.png" alt="Comentário 2">
                    <img src="prints/comentario3.png" alt="Comentário 3">
                    <img src="prints/comentario4.png" alt="Comentário 4">
                    <img src="prints/comentario5.png" alt="Comentário 5">
                    <img src="prints/comentario6.png" alt="Comentário 6">
                    <img src="prints/comentario7.png" alt="Comentário 7">

                </div>

            </div>

            <button class="next" id="next" aria-label="Próximo">
                &#10095;
            </button>

        </div>

        <div class="dots" id="dots"></div>

    </section>

    <div id="overlay" class="overlay">
        <img id="overlayImg" alt="Comentário ampliado">
    </div>

    <script src="script.js"></script>

</body>

</html>
