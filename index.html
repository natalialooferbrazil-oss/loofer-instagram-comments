<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comentários Loofer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="instagram">

    <div class="titulo">

    <div class="slider">

        <button id="prev">❮</button>

        <div class="viewport">

            <div class="track">

                <img src="prints/comentario1.png" alt="">
                <img src="prints/comentario2.png" alt="">
                <img src="prints/comentario3.png" alt="">
                <img src="prints/comentario4.png" alt="">
                <img src="prints/comentario5.png" alt="">
                <img src="prints/comentario6.png" alt="">
                <img src="prints/comentario7.png" alt="">

            </div>

        </div>

        <button id="next">❯</button>

    </div>

    <div class="dots" id="dots"></div>

</section>

<div class="overlay" id="overlay">

    <img id="overlayImg" src="" alt="">

</div>

<script src="script.js"></script>

</body>
</html>
